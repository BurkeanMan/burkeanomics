<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Burkeanomics — Setting up your account...</title></head>
<body>
<p>Setting up your account, one moment...</p>
<script>
(function() {
    var h = window.location.hash;
    if (!h) { window.location = 'https://burkeanomics.streamlit.app'; return; }
    var p = new URLSearchParams(h.slice(1));
    var type = p.get('type');
    var at = p.get('access_token');
    var rt = p.get('refresh_token') || '';
    if (!at) { window.location = 'https://burkeanomics.streamlit.app'; return; }
    var dest = 'https://burkeanomics.streamlit.app?sb_refresh=' + encodeURIComponent(rt);
    if (type === 'invite') {
        dest += '&sb_invite=' + encodeURIComponent(at);
    } else if (type === 'recovery') {
        dest += '&sb_recovery=' + encodeURIComponent(at);
    } else {
        dest += '&sb_invite=' + encodeURIComponent(at);
    }
    window.location.replace(dest);
})();
</script>
</body>
</html>
